<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ruslango — Gestão de Entregas</title>
<meta name="theme-color" content="#070B13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ruslango">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:var(--bg,#070B13);font-family:'Sora',system-ui,sans-serif;overscroll-behavior:none;color:var(--text,#fff)}
#app{min-height:100vh}
#overlay{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);align-items:flex-end}
#overlay.open{display:flex}
#toast-box{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:none;white-space:nowrap}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#1E2D40;border-radius:4px}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastAnim{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}15%,80%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0}}
.fade-up{animation:fadeUp .22s ease both}
.slide-up{animation:slideUp .28s cubic-bezier(.32,.72,0,1) both}
.spin{animation:spin 1s linear infinite}
.toast-anim{animation:toastAnim 3s ease forwards;position:absolute;left:50%;transform:translateX(-50%)}
.tap{transition:transform .1s;cursor:pointer;-webkit-user-select:none;user-select:none}
.tap:active{transform:scale(.95)}
input,select,textarea{font-family:'Sora',system-ui,sans-serif;color-scheme:dark;color:#fff;background:#111927;border:1px solid #1E2D40;border-radius:12px;padding:13px 14px;font-size:14px;width:100%;outline:none}
input::placeholder,textarea::placeholder{color:#3D5470}
input[type=date]::-webkit-calendar-picker-indicator,input[type=datetime-local]::-webkit-calendar-picker-indicator{filter:invert(.4)}
input[type=range]{padding:6px 0;border:none;background:transparent;accent-color:#F5A623}
select option{background:#111927}
textarea{resize:none;line-height:1.5}
.card{background:#0C1220;border:1px solid #1E2D40;border-radius:18px}
.btn{border:none;border-radius:14px;font-family:'Sora',system-ui,sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;width:100%}
.btn-primary{background:#2260E8;color:#fff;box-shadow:0 6px 24px #2260E840}
.btn-ghost{background:#111927;border:1px solid #1E2D40;color:#607898}
.btn-amber{background:#F5A623;color:#000;box-shadow:0 6px 24px #F5A62340}
.btn-danger{background:#E8424220;border:1px solid #E8424240;color:#E84242}
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:8px;border:1px solid}
.label{font-size:11px;font-weight:600;letter-spacing:.1em;color:#F5A623;margin-bottom:6px}
.header{position:sticky;top:0;z-index:20;background:#070B13;border-bottom:1px solid #1E2D40;padding:max(env(safe-area-inset-top),44px) 16px 14px}
.act-btn{padding:10px 8px;border-radius:12px;border:1px solid;font-family:'Sora',system-ui,sans-serif;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.act-icon{padding:10px 12px;border-radius:12px;border:1px solid;cursor:pointer;display:flex;align-items:center;background:transparent}
.filter-btn{padding:7px 14px;border-radius:12px;border:1px solid #1E2D40;background:#0C1220;color:#4A6080;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all .15s;white-space:nowrap}
.filter-btn.active{background:#2260E8;border-color:#2260E8;color:#fff}
.stat{border-radius:16px;padding:14px 12px}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:20;background:#0C1220;border-top:1px solid #1E2D40;display:flex;padding:8px 0 max(env(safe-area-inset-bottom),16px)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;border:none;background:transparent;cursor:pointer;padding:4px;font-family:'Sora',sans-serif;font-size:10px;font-weight:600;color:#3D5470;transition:color .15s}
.nav-btn.active{color:#2260E8}
.fab{position:fixed;bottom:calc(max(env(safe-area-inset-bottom),16px) + 62px);right:18px;width:52px;height:52px;border:none;border-radius:16px;background:#F5A623;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 6px 24px #F5A62345;z-index:21}
.cal-day{border-radius:10px;padding:6px 4px;text-align:center;cursor:pointer;transition:background .1s;min-height:44px;display:flex;flex-direction:column;align-items:center;gap:3px}
.cal-day.today{background:#2260E820;border:1px solid #2260E840}
.cal-day.selected{background:#2260E8;border:1px solid #2260E8}
.cal-day.has-del{font-weight:700}
.split-bar{height:6px;border-radius:3px;overflow:hidden;display:flex;gap:2px;margin-top:8px}
.tab-scroll{display:flex;gap:8px;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
.tab-scroll::-webkit-scrollbar{display:none}
</style>
</head>

async function doLogin(){
  const email=($('li-email')?.value||'').trim(),pass=$('li-pass')?.value;
  const errEl=$('li-err'),btnEl=$('li-btn');
  if(!email||!pass)return;
  errEl.style.display='none';
  btnEl.innerHTML=spin(16,'#fff')+' A entrar...';btnEl.disabled=true;
  const{user,error}=await(S.loginMode==='register'?API.signUp:API.signIn)(email,pass);
  if(error){errEl.textContent=error.message||'Erro';errEl.style.display='block';btnEl.innerHTML=S.loginMode==='register'?'Criar Conta':'Entrar';btnEl.disabled=false;return;}

}

function renderOverview(){
  const td_=today();
  const dels=S.deliveries;
  const hoje=dels.filter(d=>d.data===td_);
  const totHoje=hoje.reduce((s,d)=>s+(d.valor_total||0),0);
  const pendentes=dels.filter(d=>d.status==='pendente'||d.status==='agendada'||d.status==='em_rota');
  const concluidas=dels.filter(d=>d.status==='concluida');
  const aReceber=dels.filter(d=>!d.pago).reduce((s,d)=>s+(d.valor_total||0),0);
  const totalPago=dels.filter(d=>d.pago).reduce((s,d)=>s+(d.valor_total||0),0);
  const recent=dels.slice(0,4);

  const statsGrid=[
    {label:'Faturado hoje',val:kz(totHoje),sub:`${hoje.length} entregas`,c:'#2260E8',bg:'#2260E812'},
    {label:'A receber',val:kz(aReceber),sub:`${dels.filter(d=>!d.pago).length} pendentes`,c:'#F5A623',bg:'#F5A62312'},
    {label:'Concluídas',val:String(concluidas.length),sub:'total',c:'#0FBA81',bg:'#0FBA8112'},
    {label:'Em curso',val:String(pendentes.length),sub:'activas',c:'#A855F7',bg:'#A855F712'},
  ];

  const stats=statsGrid.map(s=>`<div class="stat" style="background:${s.bg};border:1px solid ${s.c}20"><p style="font-size:11px;color:${s.c};font-weight:600;letter-spacing:.04em;margin-bottom:6px">${s.label}</p><p style="color:#fff;font-weight:700;font-size:16px;line-height:1.1">${s.val}</p><p style="color:${s.c}80;font-size:10px;font-weight:500;margin-top:3px">${s.sub}</p></div>`).join('');

  const recentCards=recent.length?recent.map(d=>{
    const st=ST[d.status]||ST.pendente;
    return`<div class="card tap" style="padding:13px 14px;display:flex;align-items:center;gap:12px" onclick="S.dashTab='deliveries';S.expandedCard='${esc(d.id)}';setTab('deliveries')">
      <span style="width:8px;height:8px;border-radius:50%;background:${st.c};flex-shrink:0"></span>
      <div style="flex:1;min-width:0"><p style="color:#fff;font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.cliente_nome)}</p>
        <p style="color:#4A6080;font-size:12px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${d.origem?esc(d.origem)+' → ':''}${esc(d.destino)}</p></div>
      <div style="text-align:right;flex-shrink:0"><p style="color:#fff;font-weight:700;font-size:13px">${kz(d.valor_total||0)}</p>
        <p style="font-size:11px;font-weight:600;color:${st.c}">${st.label}</p></div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:32px"><p style="color:#4A6080;font-size:13px">Sem entregas ainda</p></div>`;

  // Status distribution bar
  const total=dels.length||1;
  const pctByStatus=Object.keys(ST).map(k=>({k,n:dels.filter(d=>d.status===k).length,c:ST[k].c}));

  return`<div style="padding:16px;display:flex;flex-direction:column;gap:16px">
  <!-- Stats 2x2 -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${stats}</div>

  <!-- Status bar -->
  <div class="card" style="padding:16px">
    <p style="font-size:12px;color:#607898;font-weight:600;margin-bottom:10px">DISTRIBUIÇÃO DE ESTADOS</p>
    <div style="display:flex;gap:2px;height:8px;border-radius:4px;overflow:hidden">
      ${pctByStatus.filter(p=>p.n>0).map(p=>`<div style="flex:${p.n};background:${p.c};border-radius:4px" title="${p.k}:${p.n}"></div>`).join('')}
    </div>
    <div style="display:flex;flex-wrap:wrap;gap:10px;margin-top:10px">
      ${pctByStatus.filter(p=>p.n>0).map(p=>`<span style="font-size:11px;color:#607898;display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:50%;background:${p.c};display:inline-block"></span>${ST[p.k].label}: <strong style="color:#fff">${p.n}</strong></span>`).join('')}
    </div>
  </div>

  <!-- Quick actions -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
    <button class="btn btn-ghost tap" onclick="genPDF('hoje')" style="gap:8px;font-size:13px">${I.pdf} Relatório Hoje</button>
    <button class="btn btn-ghost tap" onclick="genPDF('semana')" style="gap:8px;font-size:13px">${I.pdf} Esta Semana</button>
  </div>

  <!-- Recent -->
  <div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <p style="font-size:13px;font-weight:700;color:#fff">Últimas Entregas</p>
      <button class="tap" onclick="setTab('deliveries')" style="background:none;border:none;color:#2260E8;font-size:12px;cursor:pointer;font-family:'Sora',sans-serif;font-weight:600">Ver todas ${I.chevR}</button>
    </div>
    <div style="display:flex;flex-direction:column;gap:8px">${recentCards}</div>
  </div>
  </div>`;
}

    const label=f==='todas'?'Todas':ST[f]?.label||f;

}
function setDelFilter(f){S.filter=f;const c=$('del-list');if(c){const filtered=f==='todas'?S.deliveries:S.deliveries.filter(d=>d.status===f);c.innerHTML=filtered.length?filtered.map(d=>renderDelCard(d)).join(''):`<div style="text-align:center;padding:60px 0"><p style="color:#4A6080">Sem entregas neste estado</p></div>`;}document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));const btn=document.querySelector(`.filter-btn[onclick="setDelFilter('${f}')"]`);if(btn)btn.classList.add('active');}

  <div style="padding:10px 14px 14px;border-top:1px solid #1E2D40">
    <!-- Status buttons -->
    <p style="font-size:11px;color:#607898;font-weight:600;margin-bottom:8px">MUDAR ESTADO</p>
    <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${statusBtns}</div>
    <!-- Action buttons -->
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${!isPaid?`<button class="act-btn tap" onclick="markPaid('${esc(d.id)}')" style="background:#0FBA8115;color:#0FBA81;border-color:#0FBA8130;flex:1">${I.cash} Marcar Pago</button>`:''}
      <button class="act-icon tap" onclick="sendWA('${esc(d.id)}')" style="color:#25D366;border-color:#25D36630;background:#25D36615">${I.wa}</button>
      <button class="act-icon tap" onclick="sendSMS('${esc(d.id)}')" style="color:#2260E8;border-color:#2260E830;background:#2260E815" title="Enviar SMS">${I.sms}</button>
      <button class="act-btn tap" onclick="genInvoice('${esc(d.id)}')" style="background:#F5A62315;color:#F5A623;border-color:#F5A62330;flex:none;padding:8px 10px;font-size:11px">${I.invoice} Fatura</button>
      <button class="act-icon tap" onclick="showDelForm('${esc(d.id)}')" style="color:#2260E8;border-color:#2260E830;background:#2260E815">${I.edit}</button>
      <button class="act-icon tap" onclick="deleteDel('${esc(d.id)}')" style="color:#E84242;border-color:#E8424230;background:#E8424215">${I.trash}</button>
    </div>
    <!-- Split preview: modelo financeiro obrigatório -->
    <div style="margin-top:10px;padding:10px 12px;background:#111927;border-radius:12px">
      <div style="display:flex;justify-content:space-between;margin-bottom:6px">
        <span style="font-size:11px;color:#607898">Ruslango (${pct}%)</span>
        <span style="font-size:12px;color:#F5A623;font-weight:700">${kz(emp)}</span>
      </div>
      <div style="display:flex;justify-content:space-between">
        <span style="font-size:11px;color:#607898">Empresa cliente (${100-pct}%)</span>
        <span style="font-size:12px;color:#0FBA81;font-weight:700">${kz(ent)}</span>
      </div>
    </div>
  </div>`:'';

  return`<div class="card fade-up" id="card-${esc(d.id)}" style="border-color:${exp?st.bo:'#1E2D40'}">
  <div class="tap" onclick="toggleCard('${esc(d.id)}')" style="padding:14px 16px;cursor:pointer">
    <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">

        <p style="color:#4A6080;font-size:12px;margin:0;display:flex;align-items:center;gap:4px">${I.route} ${d.origem?esc(d.origem)+' → ':''}${esc(d.destino)}</p>
      </div>
      <div style="text-align:right;flex-shrink:0">
        <p style="color:#fff;font-weight:700;font-size:15px;margin:0 0 4px">${kz(d.valor_total||0)}</p>

function toggleCard(id){S.expandedCard=S.expandedCard===id?null:id;refreshDelList();}
function refreshDelList(){const list=$('del-list');if(!list)return;const filtered=S.filter==='todas'?S.deliveries:S.deliveries.filter(d=>d.status===S.filter);list.innerHTML=filtered.map(d=>renderDelCard(d)).join('');}
async function patchStatus(id,status){
  await API.patchDel(id,{status});S.deliveries=S.deliveries.map(d=>d.id===id?{...d,status}:d);
  await API.addLog({entrega_id:id,acao:`status→${status}`,usuario:S.user?.email||'demo'});
  S.expandedCard=null;refreshDelList();
  if(S.dashTab==='overview'){const c=$('dash-content');if(c)c.innerHTML=renderOverview();}
  toast(`Estado: ${ST[status]?.label||status}`);
}
async function markPaid(id){
  const now=new Date().toISOString();
  await API.patchDel(id,{pago:true,pagamento:'pago',data_pagamento:now});
  S.deliveries=S.deliveries.map(d=>d.id===id?{...d,pago:true,pagamento:'pago',data_pagamento:now}:d);
  S.expandedCard=null;refreshDelList();
  if(S.dashTab==='overview'||S.dashTab==='financial'){const c=$('dash-content');if(c)c.innerHTML=S.dashTab==='overview'?renderOverview():renderFinancial();}
  toast('Pagamento registado!');
}
async function deleteDel(id){
  showConfirm('Apagar esta entrega permanentemente?',
    async()=>{await API.delDel(id);S.deliveries=S.deliveries.filter(d=>d.id!==id);S.expandedCard=null;refreshDelList();toast('Entrega apagada','err');},
    {title:'Apagar Entrega',yes:'Apagar',danger:true});
}
function sendWA(id){
  const d=S.deliveries.find(x=>x.id===id);if(!d)return;
  const hora=d.horario_entrega||( d.data_entrega?new Date(d.data_entrega).toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}):'—');
  const msg=`🚚 *RUSLANGO — Nova Entrega*\n\n👤 *Cliente:* ${d.cliente_nome}\n📍 *Morada:* ${d.endereco||d.destino}\n🕐 *Hora:* ${hora}\n💰 *Valor:* ${kz(d.valor_total||0)}\n${d.observacoes?`\n📝 *Obs:* ${d.observacoes}`:''}\n\n_Confirma a entrega, por favor._`;
  const num=(d.telefone||'').replace(/\D/g,'');
  window.open(num?`https://wa.me/244${num}?text=${encodeURIComponent(msg)}`:`https://wa.me/?text=${encodeURIComponent(msg)}`,'_blank');
}

function sendSMS(id){
  const d=S.deliveries.find(x=>x.id===id);if(!d)return;
  const hora=d.horario_entrega||'—';
  const msg=`Olá, sua entrega da Ruslango está programada para ${hora}. Valor: ${Math.round(d.valor_total||0)} Kz.`;
  const num=(d.telefone||'').replace(/\D/g,'');
  if(!num){toast('Sem número de telefone registado','err');return;}
  window.open(`sms:${num}?body=${encodeURIComponent(msg)}`,'_blank');
}

function renderAgenda(){
  const mode=S.agendaMode;
  const modeBtns=['dia','semana','mes'].map(m=>`<button class="filter-btn tap ${mode===m?'active':''}" onclick="setAgendaMode('${m}')">${m==='dia'?'Dia':m==='semana'?'Semana':'Mês'}</button>`).join('');
  let body='';
  if(mode==='dia')body=renderAgendaDia();
  else if(mode==='semana')body=renderAgendaSemana();
  else body=renderAgendaMes();
  return`<div style="padding:16px;display:flex;flex-direction:column;gap:14px">
  <div style="display:flex;gap:8px">${modeBtns}</div>
  ${body}</div>`;
}

function navAgenda(dir){
  const d=new Date(S.agendaDate+'T12:00');
  if(S.agendaMode==='dia')d.setDate(d.getDate()+dir);
  else if(S.agendaMode==='semana')d.setDate(d.getDate()+dir*7);
  else d.setMonth(d.getMonth()+dir);
  S.agendaDate=d.toISOString().split('T')[0];
  const c=$('dash-content');if(c)c.innerHTML=renderAgenda();
}
function renderAgendaDia(){
  const date=S.agendaDate;
  const dels=S.deliveries.filter(d=>(d.data_entrega||d.data||'').startsWith(date));
  const label=new Date(date+'T12:00').toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long'});
  const isToday=date===today();
  const cards=dels.length?dels.map(d=>{
    const st=ST[d.status]||ST.pendente;
    const hora=d.data_entrega?new Date(d.data_entrega).toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}):'--:--';
    return`<div class="card" style="padding:14px;display:flex;gap:12px;border-left:3px solid ${st.c}">
      <div style="text-align:center;flex-shrink:0"><p style="font-size:16px;font-weight:800;color:${st.c};line-height:1">${hora}</p><p style="font-size:9px;color:#4A6080;text-transform:uppercase;font-weight:600">hora</p></div>
      <div style="flex:1;min-width:0">
        <p style="color:#fff;font-weight:700;font-size:14px;margin-bottom:3px">${esc(d.cliente_nome)}</p>
        <p style="color:#4A6080;font-size:12px;margin-bottom:6px">${d.endereco?esc(d.endereco.substring(0,40)):esc(d.destino)}</p>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <span class="badge" style="background:${st.bg};color:${st.c};border-color:${st.bo}">${st.label}</span>
          <span style="color:#fff;font-weight:700;font-size:13px">${kz(d.valor_total||0)}</span>
        </div>
      </div>
    </div>`;
  }).join(''):`<div style="text-align:center;padding:40px"><p style="color:#4A6080;font-size:13px">Sem entregas neste dia</p></div>`;

  return`<div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button class="tap act-icon" onclick="navAgenda(-1)" style="border-color:#1E2D40;color:#607898">${I.chevL}</button>
    <div style="text-align:center"><p style="color:#fff;font-weight:700;font-size:14px;text-transform:capitalize">${label}</p>${isToday?`<span style="font-size:11px;color:#F5A623;font-weight:600">Hoje</span>`:''}</div>
    <button class="tap act-icon" onclick="navAgenda(1)" style="border-color:#1E2D40;color:#607898">${I.chevR}</button>
  </div>
  <div style="display:flex;flex-direction:column;gap:8px">${cards}</div>
  ${!isToday?`<button class="btn btn-ghost tap" onclick="S.agendaDate=today();const c=$('dash-content');if(c)c.innerHTML=renderAgenda()" style="margin-top:12px;font-size:13px">Ir para Hoje</button>`:''}</div>`;
}
function renderAgendaSemana(){
  const d=new Date(S.agendaDate+'T12:00');
  const dow=d.getDay();
  const mon=new Date(d);mon.setDate(d.getDate()-(dow===0?6:dow-1));
  const days=[];for(let i=0;i<7;i++){const dd=new Date(mon);dd.setDate(mon.getDate()+i);days.push(dd);}
  const labels=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
  const td_=today();
  const weekStart=mon.toISOString().split('T')[0];
  const weekEnd=days[6].toISOString().split('T')[0];
  const cols=days.map((dd,i)=>{
    const ds=dd.toISOString().split('T')[0];
    const dayDels=S.deliveries.filter(d2=>(d2.data_entrega||d2.data||'').startsWith(ds));
    const isT=ds===td_,isSel=ds===S.agendaDate;
    const dots=dayDels.slice(0,4).map(d2=>`<span style="width:7px;height:7px;border-radius:50%;background:${ST[d2.status]?.c||'#607898'}"></span>`).join('');
    return`<div class="cal-day tap ${isT?'today':''} ${isSel?'selected':''} ${dayDels.length?'has-del':''}" onclick="S.agendaDate='${ds}';S.agendaMode='dia';const c=$('dash-content');if(c)c.innerHTML=renderAgenda()">
      <p style="font-size:10px;color:${isSel?'rgba(255,255,255,.7)':'#4A6080'};font-weight:600">${labels[i]}</p>
      <p style="font-size:16px;font-weight:${dayDels.length?700:500};color:${isSel?'#fff':isT?'#2260E8':'#CBD5E1'}">${dd.getDate()}</p>
      ${dayDels.length?`<div style="display:flex;gap:2px;flex-wrap:wrap;justify-content:center">${dots}</div>`:`<span style="width:4px;height:4px"></span>`}
    </div>`;
  });
  const weekLabel=`${days[0].toLocaleDateString('pt-PT',{day:'numeric',month:'short'})} – ${days[6].toLocaleDateString('pt-PT',{day:'numeric',month:'short'})}`;
  const weekDels=S.deliveries.filter(d2=>{const ds=(d2.data_entrega||d2.data||'').substring(0,10);return ds>=weekStart&&ds<=weekEnd;});
  const weekTotal=weekDels.reduce((s,d2)=>s+(d2.valor_total||0),0);
  return`<div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button class="tap act-icon" onclick="navAgenda(-1)" style="border-color:#1E2D40;color:#607898">${I.chevL}</button>
    <p style="color:#fff;font-weight:700;font-size:13px">${weekLabel}</p>
    <button class="tap act-icon" onclick="navAgenda(1)" style="border-color:#1E2D40;color:#607898">${I.chevR}</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;background:#0C1220;border-radius:14px;padding:10px;border:1px solid #1E2D40">${cols.join('')}</div>
  <div class="card" style="padding:14px;margin-top:10px;display:flex;justify-content:space-between">
    <span style="color:#607898;font-size:13px">${weekDels.length} entregas esta semana</span>
    <span style="color:#fff;font-weight:700;font-size:13px">${kz(weekTotal)}</span>
  </div></div>`;
}
function renderAgendaMes(){
  const d=new Date(S.agendaDate+'T12:00');
  const year=d.getFullYear(),month=d.getMonth();
  const first=new Date(year,month,1),last=new Date(year,month+1,0);
  const startDow=first.getDay()===0?6:first.getDay()-1;
  const td_=today();
  const monthLabel=d.toLocaleDateString('pt-PT',{month:'long',year:'numeric'});
  const cells=[];
  for(let i=0;i<startDow;i++)cells.push(`<div></div>`);
  for(let day=1;day<=last.getDate();day++){
    const ds=`${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const dayDels=S.deliveries.filter(d2=>(d2.data_entrega||d2.data||'').startsWith(ds));
    const isT=ds===td_,isSel=ds===S.agendaDate;
    const dots=dayDels.slice(0,3).map(d2=>`<span style="width:5px;height:5px;border-radius:50%;background:${ST[d2.status]?.c||'#607898'}"></span>`).join('');
    cells.push(`<div class="cal-day tap ${isT?'today':''} ${isSel?'selected':''}" onclick="S.agendaDate='${ds}';S.agendaMode='dia';const c=$('dash-content');if(c)c.innerHTML=renderAgenda()" style="min-height:38px;padding:4px">
      <p style="font-size:13px;font-weight:${dayDels.length?700:400};color:${isSel?'#fff':isT?'#2260E8':'#CBD5E1'}">${day}</p>
      ${dots?`<div style="display:flex;gap:1px;justify-content:center">${dots}</div>`:''}
    </div>`);
  }
  const headers=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'].map(h=>`<p style="text-align:center;font-size:10px;color:#4A6080;font-weight:600;padding:4px 0">${h}</p>`).join('');
  return`<div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
    <button class="tap act-icon" onclick="navAgenda(-1)" style="border-color:#1E2D40;color:#607898">${I.chevL}</button>
    <p style="color:#fff;font-weight:700;font-size:14px;text-transform:capitalize">${monthLabel}</p>
    <button class="tap act-icon" onclick="navAgenda(1)" style="border-color:#1E2D40;color:#607898">${I.chevR}</button>
  </div>
  <div style="background:#0C1220;border-radius:14px;padding:10px;border:1px solid #1E2D40">
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px">${headers}</div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">${cells.join('')}</div>
  </div></div>`;
}

function renderFinancial(){
  // --- date filtering helper ---
  function filterByPeriod(dels){
    const now=new Date();
    if(S.finDateFrom&&S.finDateTo){
      return dels.filter(d=>{const ds=(d.data_entrega||d.data||'').substring(0,10);return ds>=S.finDateFrom&&ds<=S.finDateTo;});
    }
    if(S.finPeriod==='diario'){const td_=today();return dels.filter(d=>(d.data_entrega||d.data||'').startsWith(td_));}
    if(S.finPeriod==='semanal'){const dow=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-(dow===0?6:dow-1));const monStr=mon.toISOString().split('T')[0];const sun=new Date(mon);sun.setDate(mon.getDate()+6);const sunStr=sun.toISOString().split('T')[0];return dels.filter(d=>{const ds=(d.data_entrega||d.data||'').substring(0,10);return ds>=monStr&&ds<=sunStr;});}
    if(S.finPeriod==='mensal'){const ym=today().substring(0,7);return dels.filter(d=>(d.data_entrega||d.data||'').startsWith(ym));}
    if(S.finPeriod==='anual'){const y=today().substring(0,4);return dels.filter(d=>(d.data_entrega||d.data||'').startsWith(y));}
    return dels;
  }

  const dels=filterByPeriod(S.deliveries);
  const allDels=S.deliveries;

  // --- KPIs ---
  const fatBruto=dels.reduce((s,d)=>s+(d.valor_total||0),0);
  const recRuslango=dels.reduce((s,d)=>s+(d.valor_ruslango||0),0);
  const valorEmpresa=dels.reduce((s,d)=>s+(d.valor_empresa||(d.valor_total||0)-(d.valor_ruslango||0)),0);
  const totalPago=dels.filter(d=>d.pago).reduce((s,d)=>s+(d.valor_total||0),0);
  const aReceber=fatBruto-totalPago;
  const devedores=allDels.filter(d=>!d.pago&&d.status==='concluida');

  // --- Period selector ---
  const periods=[['diario','Hoje'],['semanal','Semana'],['mensal','Mês'],['anual','Ano']];
  const periodBtns=periods.map(([k,l])=>`<button class="filter-btn tap ${S.finPeriod===k&&!S.finDateFrom?'active':''}" onclick="setFinPeriod('${k}')">${l}</button>`).join('');

  // --- KPI Cards (FinancialCard component) ---
  const kpis=[
    {label:'Faturamento Bruto',val:kz(fatBruto),sub:`${dels.length} entregas`,c:'#2260E8',bg:'#2260E812',icon:'📦'},
    {label:'Receita Ruslango',  val:kz(recRuslango),sub:`${dels.length?Math.round(recRuslango/fatBruto*100)||0:0}% do total`,c:'#F5A623',bg:'#F5A62312',icon:'🏢'},
    {label:'Valor Empresas',    val:kz(valorEmpresa),sub:`${dels.length?Math.round(valorEmpresa/fatBruto*100)||0:0}% do total`,c:'#0FBA81',bg:'#0FBA8112',icon:'🤝'},
    {label:'A Receber',         val:kz(aReceber),sub:`${allDels.filter(d=>!d.pago).length} pendentes`,c:'#E84242',bg:'#E8424212',icon:'⏳'},
  ];
  const kpiCards=kpis.map(k=>`
  <div class="stat tap" style="background:${k.bg};border:1px solid ${k.c}25;position:relative;overflow:hidden">
    <p style="font-size:9px;color:${k.c};font-weight:700;letter-spacing:.06em;margin-bottom:6px;text-transform:uppercase">${k.label}</p>
    <p style="color:#fff;font-weight:800;font-size:15px;line-height:1.1;margin-bottom:3px">${k.val}</p>
    <p style="color:${k.c}90;font-size:10px;font-weight:500">${k.sub}</p>
    <span style="position:absolute;right:10px;top:50%;transform:translateY(-50%);font-size:22px;opacity:.18">${k.icon}</span>
  </div>`).join('');

  // --- Chart data builder ---
  function buildChartData(){
    if(S.finPeriod==='diario'||S.finDateFrom){
      const td_=S.finDateFrom||today();
      const hours=Array.from({length:12},(_,i)=>`${String(i*2).padStart(2,'0')}:00`);
      const src=dels;
      return{
        labels:hours,
        bruto:hours.map(h=>{const hNum=parseInt(h);return src.filter(d=>{const dt=d.data_entrega||'';const dh=dt.includes('T')?parseInt(dt.split('T')[1])||0:0;return dh>=hNum&&dh<hNum+2;}).reduce((s,d)=>s+(d.valor_total||0),0);}),
        ruslango:hours.map(h=>{const hNum=parseInt(h);return src.filter(d=>{const dt=d.data_entrega||'';const dh=dt.includes('T')?parseInt(dt.split('T')[1])||0:0;return dh>=hNum&&dh<hNum+2;}).reduce((s,d)=>s+(d.valor_ruslango||0),0);}),
        parceiro:hours.map(h=>{const hNum=parseInt(h);return src.filter(d=>{const dt=d.data_entrega||'';const dh=dt.includes('T')?parseInt(dt.split('T')[1])||0:0;return dh>=hNum&&dh<hNum+2;}).reduce((s,d)=>s+(d.valor_empresa||(d.valor_total||0)-(d.valor_ruslango||0)),0);}),
      };
    }
    if(S.finPeriod==='semanal'){
      const days=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
      const now_=new Date();const dow=now_.getDay();const mon=new Date(now_);mon.setDate(now_.getDate()-(dow===0?6:dow-1));
      const weekDays=Array.from({length:7},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d.toISOString().split('T')[0];});
      return{
        labels:days,
        bruto:weekDays.map(ds=>allDels.filter(d=>(d.data_entrega||d.data||'').startsWith(ds)).reduce((s,d)=>s+(d.valor_total||0),0)),
        ruslango:weekDays.map(ds=>allDels.filter(d=>(d.data_entrega||d.data||'').startsWith(ds)).reduce((s,d)=>s+(d.valor_ruslango||0),0)),
        parceiro:weekDays.map(ds=>allDels.filter(d=>(d.data_entrega||d.data||'').startsWith(ds)).reduce((s,d)=>s+(d.valor_empresa||(d.valor_total||0)-(d.valor_ruslango||0)),0)),
      };
    }
    if(S.finPeriod==='mensal'){
      const ym=today().substring(0,7);const daysInMonth=new Date(parseInt(ym.split('-')[0]),parseInt(ym.split('-')[1]),0).getDate();
      const days=Array.from({length:daysInMonth},(_,i)=>String(i+1));
      const dates=Array.from({length:daysInMonth},(_,i)=>`${ym}-${String(i+1).padStart(2,'0')}`);
      return{labels:days,bruto:dates.map(ds=>allDels.filter(d=>(d.data_entrega||d.data||'').startsWith(ds)).reduce((s,d)=>s+(d.valor_total||0),0)),ruslango:dates.map(ds=>allDels.filter(d=>(d.data_entrega||d.data||'').startsWith(ds)).reduce((s,d)=>s+(d.valor_ruslango||0),0)),parceiro:dates.map(ds=>allDels.filter(d=>(d.data_entrega||d.data||'').startsWith(ds)).reduce((s,d)=>s+(d.valor_empresa||(d.valor_total||0)-(d.valor_ruslango||0)),0))};
    }
    // anual
    const y=today().substring(0,4);const months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const mKeys=Array.from({length:12},(_,i)=>`${y}-${String(i+1).padStart(2,'0')}`);
    return{labels:months,bruto:mKeys.map(m=>allDels.filter(d=>(d.data_entrega||d.data||'').startsWith(m)).reduce((s,d)=>s+(d.valor_total||0),0)),ruslango:mKeys.map(m=>allDels.filter(d=>(d.data_entrega||d.data||'').startsWith(m)).reduce((s,d)=>s+(d.valor_ruslango||0),0)),parceiro:mKeys.map(m=>allDels.filter(d=>(d.data_entrega||d.data||'').startsWith(m)).reduce((s,d)=>s+(d.valor_empresa||(d.valor_total||0)-(d.valor_ruslango||0)),0))};
  }

  const devedoresList=devedores.length?devedores.map(d=>`
  <div style="display:flex;align-items:center;justify-content:space-between;padding:12px 14px;border-bottom:1px solid #111927">
    <div style="min-width:0;flex:1"><p style="color:#fff;font-weight:600;font-size:14px;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(d.cliente_nome)}</p>
      <p style="color:#4A6080;font-size:12px">${fmtD(d.data_entrega||d.data)}</p></div>
    <div style="text-align:right;flex-shrink:0;margin-left:10px">
      <p style="color:#E84242;font-weight:700;font-size:14px">${kz(d.valor_total||0)}</p>
      <button class="tap" onclick="markPaid('${esc(d.id)}')" style="background:#0FBA8115;border:1px solid #0FBA8130;border-radius:8px;color:#0FBA81;font-size:11px;font-weight:700;cursor:pointer;padding:3px 8px;font-family:'Sora',sans-serif;margin-top:4px">Pago</button>
    </div>
  </div>`).join(''):`<div style="padding:28px;text-align:center"><p style="color:#0FBA81;font-weight:600">✓ Sem dívidas em aberto</p></div>`;

  const pdfBtns=[
    {label:'Hoje',tipo:'hoje'},{label:'Semana',tipo:'semana'},{label:'Mês',tipo:'mes'},
  ].map(b=>`<button class="btn btn-ghost tap" onclick="genPDF('${b.tipo}')" style="font-size:12px;gap:6px;padding:12px">${I.pdf} ${b.label}</button>`).join('');
  const csvBtn=`<button class="btn tap" onclick="exportCSV()" style="font-size:12px;gap:6px;padding:12px;background:#0FBA8115;border:1px solid #0FBA8130;color:#0FBA81">${I.csv} CSV</button>`;

  return`<div style="padding:16px;display:flex;flex-direction:column;gap:14px">

  <!-- Period + Date filter -->
  <div class="card" style="padding:12px 14px">
    <div style="display:flex;gap:8px;margin-bottom:12px;align-items:center;flex-wrap:wrap">
      <div class="tab-scroll" style="flex:1">${periodBtns}</div>
      <button class="filter-btn tap ${S.finDateFrom?'active':''}" onclick="toggleFinDateFilter()" style="font-size:11px">📅 Intervalo</button>
    </div>
    <div id="fin-date-row" style="display:${S.finDateFrom?'grid':'none'};grid-template-columns:1fr 1fr;gap:10px">
      <div><label style="font-size:11px;color:#607898;font-weight:500;display:block;margin-bottom:4px">De</label>
        <input type="date" id="fin-from" value="${S.finDateFrom}" onchange="applyFinDateFilter()" style="padding:9px 10px;font-size:13px"></div>
      <div><label style="font-size:11px;color:#607898;font-weight:500;display:block;margin-bottom:4px">Até</label>
        <input type="date" id="fin-to" value="${S.finDateTo}" onchange="applyFinDateFilter()" style="padding:9px 10px;font-size:13px"></div>
    </div>
  </div>

  <!-- KPI Grid 2x2 -->
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">${kpiCards}</div>

  <!-- RevenueChart -->
  <div class="card" style="padding:14px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
      <p style="font-size:12px;color:#607898;font-weight:700;text-transform:uppercase;letter-spacing:.06em">Gráfico de Receitas</p>
      <div style="display:flex;gap:10px">
        <span style="font-size:10px;color:#2260E8;display:flex;align-items:center;gap:4px"><span style="width:10px;height:3px;background:#2260E8;display:inline-block;border-radius:2px"></span>Bruto</span>
        <span style="font-size:10px;color:#F5A623;display:flex;align-items:center;gap:4px"><span style="width:10px;height:3px;background:#F5A623;display:inline-block;border-radius:2px"></span>Ruslango</span>
        <span style="font-size:10px;color:#0FBA81;display:flex;align-items:center;gap:4px"><span style="width:10px;height:3px;background:#0FBA81;display:inline-block;border-radius:2px"></span>Empresas</span>
      </div>
    </div>
    <div style="position:relative;height:180px"><canvas id="revenue-chart"></canvas></div>
  </div>

  <!-- Export buttons -->
  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">${pdfBtns}${csvBtn}</div>

  <!-- Devedores -->
  <div class="card" style="overflow:hidden">
    <div style="padding:14px;border-bottom:1px solid #1E2D40;display:flex;justify-content:space-between;align-items:center">
      <p style="font-weight:700;color:#fff;font-size:14px">Clientes Devedores</p>
      <span style="font-size:12px;color:#E84242;font-weight:600">${devedores.length} em dívida</span>
    </div>
    ${devedoresList}
  </div>
  </div>`;

  // Chart rendered after DOM update via requestAnimationFrame in setTab
}

function setFinPeriod(p){
  S.finPeriod=p;S.finDateFrom='';S.finDateTo='';
  const c=$('dash-content');if(c)c.innerHTML=renderFinancial();
  setTimeout(drawRevenueChart,50);
}

function toggleFinDateFilter(){
  const row=$('fin-date-row');if(!row)return;
  if(row.style.display==='none'){row.style.display='grid';}
  else{S.finDateFrom='';S.finDateTo='';const c=$('dash-content');if(c)c.innerHTML=renderFinancial();setTimeout(drawRevenueChart,50);}
}

function applyFinDateFilter(){
  S.finDateFrom=$('fin-from')?.value||'';
  S.finDateTo=$('fin-to')?.value||'';
  if(S.finDateFrom&&S.finDateTo){const c=$('dash-content');if(c)c.innerHTML=renderFinancial();setTimeout(drawRevenueChart,50);}
}

function drawRevenueChart(){
  if(!window.Chart)return;
  const canvas=$('revenue-chart');if(!canvas)return;
  // destroy previous instance
  if(S._chartInst){try{S._chartInst.destroy();}catch(e){}}
  const dels=S.deliveries;
  function filterByPeriod2(dels2){
    const now=new Date();
    if(S.finDateFrom&&S.finDateTo)return dels2.filter(d=>{const ds=(d.data_entrega||d.data||'').substring(0,10);return ds>=S.finDateFrom&&ds<=S.finDateTo;});
    if(S.finPeriod==='diario'){const td_=today();return dels2.filter(d=>(d.data_entrega||d.data||'').startsWith(td_));}
    if(S.finPeriod==='semanal'){const dow=now.getDay();const mon=new Date(now);mon.setDate(now.getDate()-(dow===0?6:dow-1));const monStr=mon.toISOString().split('T')[0];const sun=new Date(mon);sun.setDate(mon.getDate()+6);const sunStr=sun.toISOString().split('T')[0];return dels2.filter(d=>{const ds=(d.data_entrega||d.data||'').substring(0,10);return ds>=monStr&&ds<=sunStr;});}
    if(S.finPeriod==='mensal'){const ym=today().substring(0,7);return dels2.filter(d=>(d.data_entrega||d.data||'').startsWith(ym));}
    const y=today().substring(0,4);return dels2.filter(d=>(d.data_entrega||d.data||'').startsWith(y));
  }
  const src=(S.finDateFrom&&S.finDateTo)?filterByPeriod2(dels):dels;
  let labels,bruto,ruslango,parceiro;
  if(S.finPeriod==='diario'||(S.finDateFrom&&S.finDateTo)){
    const hours=Array.from({length:12},(_,i)=>String(i*2).padStart(2,'0')+'h');
    labels=hours;
    const hMap=(fn)=>Array.from({length:12},(_,i)=>{const h=i*2;return src.filter(d=>{const dt=d.data_entrega||'';const dh=dt.includes('T')?parseInt(dt.split('T')[1])||0:0;return dh>=h&&dh<h+2;}).reduce((s,d)=>fn(s,d),0);});
    bruto=hMap((s,d)=>s+(d.valor_total||0));ruslango=hMap((s,d)=>s+(d.valor_ruslango||0));parceiro=hMap((s,d)=>s+(d.valor_empresa||(d.valor_total||0)-(d.valor_ruslango||0)));
  } else if(S.finPeriod==='semanal'){
    labels=['Seg','Ter','Qua','Qui','Sex','Sáb','Dom'];
    const now_=new Date();const dow=now_.getDay();const mon=new Date(now_);mon.setDate(now_.getDate()-(dow===0?6:dow-1));
    const wds=Array.from({length:7},(_,i)=>{const d_=new Date(mon);d_.setDate(mon.getDate()+i);return d_.toISOString().split('T')[0];});
    bruto=wds.map(ds=>dels.filter(d=>(d.data_entrega||d.data||'').startsWith(ds)).reduce((s,d)=>s+(d.valor_total||0),0));
    ruslango=wds.map(ds=>dels.filter(d=>(d.data_entrega||d.data||'').startsWith(ds)).reduce((s,d)=>s+(d.valor_ruslango||0),0));
    parceiro=wds.map(ds=>dels.filter(d=>(d.data_entrega||d.data||'').startsWith(ds)).reduce((s,d)=>s+(d.valor_empresa||(d.valor_total||0)-(d.valor_ruslango||0)),0));
  } else if(S.finPeriod==='mensal'){
    const ym=today().substring(0,7);const dim=new Date(parseInt(ym.split('-')[0]),parseInt(ym.split('-')[1]),0).getDate();
    labels=Array.from({length:dim},(_,i)=>String(i+1));
    const dates=Array.from({length:dim},(_,i)=>`${ym}-${String(i+1).padStart(2,'0')}`);
    bruto=dates.map(ds=>dels.filter(d=>(d.data_entrega||d.data||'').startsWith(ds)).reduce((s,d)=>s+(d.valor_total||0),0));
    ruslango=dates.map(ds=>dels.filter(d=>(d.data_entrega||d.data||'').startsWith(ds)).reduce((s,d)=>s+(d.valor_ruslango||0),0));
    parceiro=dates.map(ds=>dels.filter(d=>(d.data_entrega||d.data||'').startsWith(ds)).reduce((s,d)=>s+(d.valor_empresa||(d.valor_total||0)-(d.valor_ruslango||0)),0));
  } else {
    labels=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
    const y=today().substring(0,4);const mKeys=Array.from({length:12},(_,i)=>`${y}-${String(i+1).padStart(2,'0')}`);
    bruto=mKeys.map(m=>dels.filter(d=>(d.data_entrega||d.data||'').startsWith(m)).reduce((s,d)=>s+(d.valor_total||0),0));
    ruslango=mKeys.map(m=>dels.filter(d=>(d.data_entrega||d.data||'').startsWith(m)).reduce((s,d)=>s+(d.valor_ruslango||0),0));
    parceiro=mKeys.map(m=>dels.filter(d=>(d.data_entrega||d.data||'').startsWith(m)).reduce((s,d)=>s+(d.valor_empresa||(d.valor_total||0)-(d.valor_ruslango||0)),0));
  }
  S._chartInst=new Chart(canvas,{
    type:'bar',
    data:{labels,datasets:[
      {label:'Bruto',data:bruto,backgroundColor:'#2260E840',borderColor:'#2260E8',borderWidth:2,borderRadius:4,borderSkipped:false},
      {label:'Ruslango',data:ruslango,backgroundColor:'#F5A62340',borderColor:'#F5A623',borderWidth:2,borderRadius:4,borderSkipped:false},
      {label:'Empresas',data:parceiro,backgroundColor:'#0FBA8140',borderColor:'#0FBA81',borderWidth:2,borderRadius:4,borderSkipped:false},
    ]},
    options:{
      responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{backgroundColor:'#0C1220',borderColor:'#1E2D40',borderWidth:1,titleColor:'#D0DCF0',bodyColor:'#607898',padding:10,callbacks:{label:(ctx)=>`${ctx.dataset.label}: ${kz(ctx.parsed.y)}`}}},
      scales:{
        x:{grid:{color:'#1E2D4030'},ticks:{color:'#607898',font:{size:9,family:'Sora'}}},
        y:{grid:{color:'#1E2D4030'},ticks:{color:'#607898',font:{size:9,family:'Sora'},callback:(v)=>kzK(v)+'Kz'},beginAtZero:true},
      },
    },
  });
}

/* ══════════════════════════════
   PDF GENERATION (Relatórios)
══════════════════════════════ */
function genPDF(tipo='hoje'){
  if(!window.jspdf){toast('jsPDF não disponível','err');return;}
  const{jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const now=new Date();
  const dateStr=now.toLocaleDateString('pt-PT');
  const td_=today();
  let dels=S.deliveries;
  let titulo='Relatório Completo';
  if(tipo==='hoje'){dels=dels.filter(d=>(d.data_entrega||d.data||'').startsWith(td_));titulo='Relatório Diário — '+dateStr;}
  else if(tipo==='semana'){
    const d=new Date();const dow=d.getDay();const mon=new Date(d);mon.setDate(d.getDate()-(dow===0?6:dow-1));
    const monStr=mon.toISOString().split('T')[0];const sun=new Date(mon);sun.setDate(mon.getDate()+6);const sunStr=sun.toISOString().split('T')[0];
    dels=dels.filter(d2=>{const ds=(d2.data_entrega||d2.data||'').substring(0,10);return ds>=monStr&&ds<=sunStr;});titulo='Relatório Semanal';
  } else if(tipo==='mes'){
    const ym=td_.substring(0,7);dels=dels.filter(d2=>(d2.data_entrega||d2.data||'').startsWith(ym));titulo=`Relatório Mensal — ${now.toLocaleDateString('pt-PT',{month:'long',year:'numeric'})}`;
  }

  const total=dels.reduce((s,d)=>s+(d.valor_total||0),0);
  const pago=dels.filter(d=>d.pago).reduce((s,d)=>s+(d.valor_total||0),0);
  const pendente=total-pago;
  const empresa=dels.reduce((s,d)=>s+(d.valor_empresa||(d.valor_total||0)*((d.percentual_empresa||30)/100)),0);
  const empCliente=total-empresa;

  // Header
  doc.setFillColor(7,11,19);doc.rect(0,0,210,52,'F');
  doc.setFillColor(26,52,96);doc.rect(0,0,5,52,'F');
  doc.addImage(LOGO_SRC,'PNG',12,8,60,30);
  doc.setTextColor(74,96,128);doc.setFontSize(9);doc.setFont('helvetica','normal');
  doc.text(S.company.name,12,44);
  doc.setTextColor(200,212,228);doc.setFontSize(15);doc.setFont('helvetica','bold');
  doc.text(titulo,80,18);
  doc.setFontSize(9);doc.setFont('helvetica','normal');doc.setTextColor(74,96,128);
  doc.text(`Gerado: ${dateStr} às ${now.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'})}`,80,26);
  doc.text(`Total de entregas: ${dels.length}`,80,34);

  // Summary cards
  const cY=58;
  const summaries=[
    {l:'TOTAL',v:total,c:[34,96,232]},{l:'PAGO',v:pago,c:[15,186,129]},
    {l:'PENDENTE',v:pendente,c:[232,66,66]},{l:'EMPRESA',v:empresa,c:[245,166,35]},{l:'EMPRESAS',v:empCliente,c:[15,186,129]},
  ];
  summaries.forEach(({l,v,c},i)=>{
    const x=14+i*39;const w=36;
    doc.setFillColor(12,18,32);doc.roundedRect(x,cY,w,20,2,2,'F');
    doc.setTextColor(...c);doc.setFontSize(6);doc.setFont('helvetica','bold');doc.text(l,x+3,cY+7);
    doc.setFontSize(8);doc.text(v.toLocaleString('pt-AO')+' Kz',x+3,cY+16);
  });

  // Table
  const tY=cY+26;
  doc.setFillColor(17,25,39);doc.rect(14,tY,182,8,'F');
  doc.setTextColor(74,96,128);doc.setFontSize(7);doc.setFont('helvetica','bold');
  const cols2=[{t:'CLIENTE',x:18},{t:'DESTINO',x:65},{t:'VALOR',x:108},{t:'EMPRESA',x:130},{t:'ENTREGADOR',x:152},{t:'ESTADO',x:175}];
  cols2.forEach(c=>doc.text(c.t,c.x,tY+5.5));

  let y=tY+10;
  dels.forEach((d,i)=>{
    if(y>270){doc.addPage();y=20;}
    if(i%2===0){doc.setFillColor(11,17,32);doc.rect(14,y-1,182,9,'F');}
    const emp2=d.valor_empresa||(d.valor_total||0)*((d.percentual_empresa||30)/100);
    const ent2=(d.valor_empresa||(d.valor_total||0)-emp2); // empresa cliente
    doc.setFont('helvetica','normal');doc.setTextColor(200,212,228);doc.setFontSize(7.5);
    doc.text(String(d.cliente_nome||'').substring(0,18),18,y+5.5);
    doc.text(String(d.destino||'').substring(0,16),65,y+5.5);
    doc.text((d.valor_total||0).toLocaleString('pt-AO')+' Kz',108,y+5.5);
    doc.setTextColor(245,166,35);doc.text(emp2.toLocaleString('pt-AO')+' Kz',130,y+5.5);
    doc.setTextColor(168,85,247);doc.text(ent2.toLocaleString('pt-AO')+' Kz',152,y+5.5);
    const sc=ST[d.status];doc.setTextColor(parseInt(sc?.c?.slice(1,3)||'60',16),parseInt(sc?.c?.slice(3,5)||'78',16),parseInt(sc?.c?.slice(5,7)||'98',16));
    doc.text(sc?.label||d.status,175,y+5.5);
    y+=9;
  });
  doc.save(`Ruslango-${tipo}-${dateStr.replace(/\//g,'-')}.pdf`);
  toast('PDF gerado com sucesso!');
}

async function saveNewCo(){
  const name=($('co-name')?.value||'').trim();
  const nif=($('co-nif')?.value||'').trim();
  const morada=($('co-morada')?.value||'').trim();
  const tel=($('co-tel')?.value||'').replace(/\D/g,'');
  const email=($('co-email')?.value||'').trim();
  const pct=parseFloat($('co-pct')?.value)||30;
  if(!name){toast('Nome obrigatório','err');return;}
  if(!nif){toast('NIF obrigatório','err');return;}
  if(!morada){toast('Morada obrigatória','err');return;}
  if(!tel||!/^[0-9]{9,15}$/.test(tel)){toast('Telefone inválido','err');return;}
  const btn=$('co-save-btn');if(btn){btn.innerHTML=spin(16,'#fff')+' Criar';btn.disabled=true;}
  const c=await API.addCo(S.user.id,name,pct,{nif,morada,tel,email});S.companies.push(c);
  closeOverlay();render();toast('Empresa criada!');
}

async function saveCoSettings(id){

function recalcSplit(){
  const val=parseFloat($('f-val')?.value)||0;
  const pct=parseFloat($('f-pct')?.value)||0;
  const ruslango=val*(pct/100); // margem Ruslango
  const empresa=val-ruslango;   // valor líquido empresa cliente
  if($('f-emp'))$('f-emp').textContent=val?kz(ruslango):'—';
  if($('f-ent'))$('f-ent').textContent=val?kz(empresa):'—';
  if($('f-bar-emp'))$('f-bar-emp').style.flex=String(pct);
  if($('f-bar-ent'))$('f-bar-ent').style.flex=String(100-pct);
}

function validatePhone(el){
  const v=(el.value||'').replace(/\D/g,'');
  el.value=v;
  el.style.borderColor=(!v||/^[0-9]{9,15}$/.test(v))?'#1E2D40':'#E84242';
}
async function saveDelForm(editId){
  const nome=($('f-nome')?.value||'').trim();
  const dest=($('f-dest')?.value||'').trim();
  const valRaw=$('f-val')?.value||'0';
  const telRaw=($('f-tel')?.value||'').replace(/\D/g,'');
  if(!nome||!dest||!valRaw){toast('Preenche os campos obrigatórios *','err');return;}
  if(telRaw && !/^[0-9]{9,15}$/.test(telRaw)){toast('Telefone inválido (9-15 dígitos)','err');return;}
  const btn=$('f-save-btn');
  if(btn){btn.innerHTML=spin(16,'#fff')+' A guardar...';btn.disabled=true;}
  const valor_total=parseFloat(valRaw)||0;
  const valor_ruslango=parseFloat($('f-ruslango')?.value||'0')||0;
  const valor_parceiro=valor_total-valor_ruslango;
  const pct=parseFloat($('f-pct')?.value)||S.company?.percentual_padrao||30;
  const valor_empresa=valor_total*(pct/100);
  // valor_empresa = valor_total - valor_ruslango (modelo financeiro Ruslango)
  const dt=$('f-dt')?.value||'';
  const payload={
    company_id:S.company.id,cliente_nome:nome,telefone:telRaw,
    endereco:$('f-end')?.value||'',origem:$('f-orig')?.value||'',destino:dest,
    data_entrega:dt,data:dt?dt.substring(0,10):today(),
    horario_entrega:$('f-hora')?.value||'',
    valor_total,valor_ruslango,valor_parceiro,
    percentual_ruslango:pct,valor_empresa,
    nif_cliente:$('f-nif')?.value||'',
    nome_empresa:$('f-nomeEmp')?.value||'',
    email_faturacao:$('f-emailFat')?.value||'',
    status:$('f-status')?.value||'agendada',pagamento:$('f-pag')?.value||'pendente',
    pago:$('f-pag')?.value==='pago',observacoes:$('f-obs')?.value||'',
  };
  if(editId){
    await API.patchDel(editId,payload);
    S.deliveries=S.deliveries.map(d=>d.id===editId?{...d,...payload}:d);
    await API.addLog({entrega_id:editId,acao:'editado',usuario:S.user?.email||'demo'});
    toast('Entrega actualizada ✓');
  } else {
    const nd=await API.addDel(payload);
    S.deliveries.unshift(nd);
    await API.addLog({entrega_id:nd.id,acao:'criado',usuario:S.user?.email||'demo'});
    toast('Entrega criada ✓');
    // Show optional send actions (no forced prompts)
    setTimeout(()=>showPostSaveActions(nd.id), 400);
  }
  closeOverlay();S.expandedCard=null;
  const c=$('dash-content');
  if(c){if(S.dashTab==='deliveries')c.innerHTML=renderDeliveries();else if(S.dashTab==='overview')c.innerHTML=renderOverview();}
}

/* ══════════════════════════════
   CSV EXPORT
══════════════════════════════ */
function exportCSV(){
  const dels=S.deliveries;
  const header=['ID','Cliente','Telefone','Origem','Destino','Horario','Valor Total','Taxa Ruslango','Lucro Liquido','Estado','Pagamento','Data'];
  const rows=dels.map(d=>[
    d.id,d.cliente_nome,d.telefone||'',d.origem||'',d.destino,
    d.horario_entrega||'',d.valor_total||0,d.valor_ruslango||0,
    ((d.valor_empresa||0)-(d.valor_ruslango||0)),
    d.status,d.pagamento,d.data||'',
  ].map(v=>`"${String(v).replace(/"/g,'""')}"`).join(','));
  const csv=[header.join(','),...rows].join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');a.href=url;a.download=`Ruslango-${S.company?.name||'export'}-${today()}.csv`;
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
  toast('CSV exportado com sucesso!');
}

async function createUser(){
  const email=($('nu-email')?.value||'').trim();
  const pass=$('nu-pass')?.value||'';
  const role=$('nu-role')?.value||'analista';
  if(!email||!pass){toast('Preenche email e senha','err');return;}
  if(pass.length<8){toast('Senha mínima: 8 caracteres','err');return;}
  const btn=$('nu-btn');if(btn){btn.innerHTML=spin(16,'#fff')+' A criar...';btn.disabled=true;}
  if(DEMO){
    S.mockUsers.push({id:'u'+Date.now(),email,role,created_at:new Date().toISOString()});
    toast('Utilizador criado! (modo demo)');
  } else {
    try{
      const{data,error}=await sb.auth.admin.createUser({email,password:pass,email_confirm:true});
      if(error)throw error;
      await sb.from('profiles').insert({id:data.user.id,email,role});
      toast('Utilizador criado no Supabase!');
    } catch(e){toast(e.message||'Erro ao criar utilizador','err');}
  }
  const c=$('dash-content');if(c)c.innerHTML=renderUsers();
}

function deleteUser(id){
  showConfirm('Remover este utilizador do sistema?',
    ()=>{S.mockUsers=S.mockUsers.filter(u=>u.id!==id);const c=$('dash-content');if(c)c.innerHTML=renderUsers();toast('Utilizador removido','err');},
    {title:'Remover Utilizador',yes:'Remover',danger:true});
}
