<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Ruslango — Gestão de Entregas</title>
<meta name="theme-color" content="#070B13">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Ruslango">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*,*::before,*::after{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
html,body{height:100%;background:#070B13;font-family:'Sora',system-ui,sans-serif;overscroll-behavior:none;color:#fff}
#app{min-height:100vh}
#overlay{display:none;position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);align-items:flex-end}
#overlay.open{display:flex}
#toast-box{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:100;pointer-events:none}

/* Scroll */
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:#1E2D40;border-radius:4px}

/* Animations */
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes toastIn{0%{opacity:0;transform:translateX(-50%) translateY(-8px)}15%,80%{opacity:1;transform:translateX(-50%) translateY(0)}100%{opacity:0;transform:translateX(-50%) translateY(-8px)}}

.fade-up{animation:fadeUp .22s ease both}
.slide-up{animation:slideUp .28s cubic-bezier(.32,.72,0,1) both}
.spin{animation:spin 1s linear infinite}
.toast-anim{animation:toastIn 3s ease forwards}

/* Tap effect */
.tap{transition:transform .1s;cursor:pointer;-webkit-user-select:none;user-select:none}
.tap:active{transform:scale(.95)}

/* Forms */
input,select,textarea{
  font-family:'Sora',system-ui,sans-serif;
  color-scheme:dark;
  color:#fff;
  background:#111927;
  border:1px solid #1E2D40;
  border-radius:12px;
  padding:13px 14px;
  font-size:14px;
  width:100%;
  outline:none;
}
input::placeholder{color:#3D5470}
input[type=date]::-webkit-calendar-picker-indicator{filter:invert(.4)}
select option{background:#111927}

/* Cards */
.card{background:#0C1220;border:1px solid #1E2D40;border-radius:18px}
.card-done{border-color:#0FBA8130}

/* Buttons */
.btn{border:none;border-radius:14px;font-family:'Sora',system-ui,sans-serif;font-weight:700;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;width:100%}
.btn-primary{background:#2260E8;color:#fff;box-shadow:0 6px 24px #2260E840}
.btn-ghost{background:#111927;border:1px solid #1E2D40;color:#607898}
.btn-amber{background:#F5A623;color:#000;box-shadow:0 8px 28px #F5A62345}

/* Badges */
.badge{display:inline-flex;align-items:center;font-size:11px;font-weight:600;padding:3px 9px;border-radius:8px;border:1px solid}
.badge-done{background:#0FBA8115;color:#0FBA81;border-color:#0FBA8130}
.badge-pending{background:#F5A62315;color:#F5A623;border-color:#F5A62330}
.badge-paid{background:#0FBA8115;color:#0FBA81;border-color:#0FBA8130}
.badge-unpaid{background:#E8424215;color:#E84242;border-color:#E8424230}

/* Nav header */
.header{position:sticky;top:0;z-index:20;background:#070B13;border-bottom:1px solid #1E2D40;padding:max(env(safe-area-inset-top),44px) 16px 14px}
.safe-top{padding-top:max(env(safe-area-inset-top),44px)}

/* FAB */
.fab{position:fixed;bottom:28px;right:20px;width:56px;height:56px;border:none;border-radius:18px;background:#F5A623;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 8px 32px #F5A62345;z-index:10}

/* Action buttons in card */
.act-btn{flex:1;min-width:70px;padding:10px 8px;border-radius:12px;border:1px solid;font-family:'Sora',system-ui,sans-serif;font-weight:700;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:5px}
.act-icon{padding:10px 12px;border-radius:12px;border:1px solid;cursor:pointer;display:flex;align-items:center;background:transparent}

/* Filter buttons */
.filter-btn{padding:8px 14px;border-radius:12px;border:1px solid #1E2D40;background:#0C1220;color:#4A6080;font-size:12px;font-weight:600;cursor:pointer;font-family:'Sora',sans-serif;transition:all .15s}
.filter-btn.active{background:#2260E8;border-color:#2260E8;color:#fff}

/* Stat cards */
.stat{border-radius:16px;padding:14px 12px}

/* Section label */
.label{font-size:11px;font-weight:600;letter-spacing:.1em;color:#F5A623;margin-bottom:6px}
</style>
</head>

<div id="overlay" onclick="overlayClick(event)"></div>

/* ═══════════════════════════════════════
   CONFIG
═══════════════════════════════════════ */
const SUPA_URL = 'SUA_SUPABASE_URL';
const SUPA_KEY = 'SUA_SUPABASE_ANON_KEY';
const DEMO = SUPA_URL.startsWith('SUA_');

let sb = null;
if (!DEMO && window.supabase) {
  sb = window.supabase.createClient(SUPA_URL, SUPA_KEY);
}

   MOCK DATA
═══════════════════════════════════════ */

let _cos = [
  {id:'c1',user_id:'u1',name:'Ruslango Express Luanda',created_at:new Date().toISOString()},

const _td = new Date().toISOString().split('T')[0];
let _dels = [
  {id:'d1',company_id:'c1',cliente_nome:'João Baptista',telefone:'923456789',origem:'Maianga',destino:'Talatona',valor:2500,status:'pendente',pagamento:'pendente',data:_td,created_at:new Date().toISOString()},
  {id:'d2',company_id:'c1',cliente_nome:'Maria Fernanda',telefone:'912345678',origem:'Viana',destino:'Miramar',valor:3500,status:'concluida',pagamento:'pago',data:_td,created_at:new Date().toISOString()},
  {id:'d3',company_id:'c1',cliente_nome:'Carlos Pereira',telefone:'934567890',origem:'Cacuaco',destino:'Ingombota',valor:1800,status:'pendente',pagamento:'pendente',data:_td,created_at:new Date().toISOString()},
  {id:'d4',company_id:'c1',cliente_nome:'Ana Luísa',telefone:'941234567',origem:'Kilamba',destino:'Alvalade',valor:4200,status:'concluida',pagamento:'pago',data:_td,created_at:new Date().toISOString()},
  {id:'d5',company_id:'c1',cliente_nome:'Domingos Sousa',telefone:'951234567',origem:'Rangel',destino:'Cazenga',valor:1200,status:'pendente',pagamento:'pendente',data:_td,created_at:new Date().toISOString()},
];

/* ═══════════════════════════════════════
   API
═══════════════════════════════════════ */
const API = {
  async signIn(email, pass) {
    if (DEMO) { _user={id:'u1',email}; return {user:_user,error:null}; }
    const {data,error} = await sb.auth.signInWithPassword({email,password:pass});
    return {user:data?.user, error};
  },
  async signUp(email, pass) {
    if (DEMO) { _user={id:'u1',email}; return {user:_user,error:null}; }
    const {data,error} = await sb.auth.signUp({email,password:pass});
    return {user:data?.user, error};
  },
  async signOut() { _user=null; if (!DEMO && sb) await sb.auth.signOut(); },
  async session() {
    if (DEMO) return _user;
    if (!sb) return null;
    const {data} = await sb.auth.getSession();
    return data?.session?.user || null;
  },

  async getCos(uid) {
    if (DEMO) return _cos.filter(c=>c.user_id==='u1');
    const {data} = await sb.from('companies').select('*').eq('user_id',uid).order('created_at');
    return data||[];
  },
  async addCo(uid, name) {
    if (DEMO) { const c={id:'c'+Date.now(),user_id:'u1',name,created_at:new Date().toISOString()}; _cos.push(c); return c; }
    const {data} = await sb.from('companies').insert({user_id:uid,name}).select().single();
    return data;
  },
  async delCo(id) {
    if (DEMO) { _cos=_cos.filter(c=>c.id!==id); return; }
    await sb.from('companies').delete().eq('id',id);
  },

  async getDels(cid) {
    if (DEMO) return _dels.filter(d=>d.company_id===cid).slice().sort((a,b)=>new Date(b.created_at)-new Date(a.created_at));
    const {data} = await sb.from('deliveries').select('*').eq('company_id',cid).order('created_at',{ascending:false});
    return data||[];
  },
  async addDel(d) {
    if (DEMO) { const nd={...d,id:'d'+Date.now(),created_at:new Date().toISOString()}; _dels.unshift(nd); return nd; }
    const {data} = await sb.from('deliveries').insert(d).select().single();
    return data;
  },
  async patchDel(id, patch) {
    if (DEMO) { _dels=_dels.map(d=>d.id===id?{...d,...patch}:d); return; }
    await sb.from('deliveries').update(patch).eq('id',id);
  },
  async delDel(id) {
    if (DEMO) { _dels=_dels.filter(d=>d.id!==id); return; }
    await sb.from('deliveries').delete().eq('id',id);
  }
};

const $ = id => document.getElementById(id);

const kzK = v => v>=1000 ? (v/1000).toFixed(1)+'K' : String(v);
const today = () => new Date().toISOString().split('T')[0];
const fmtD  = s => s ? new Date(s+'T12:00').toLocaleDateString('pt-PT',{day:'2-digit',month:'short'}) : '';
const esc   = s => String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

function toast(msg, type='ok') {
  const box = $('toast-box');
  const c = type==='ok' ? {bg:'#0C1220EE',border:'#0FBA8140',txt:'#D0DCF0',icon:'✓',ic:'#0FBA81'} : {bg:'#0C1220EE',border:'#E8424240',txt:'#D0DCF0',icon:'✕',ic:'#E84242'};
  box.innerHTML = `<div class="toast-anim" style="background:${c.bg};border:1px solid ${c.border};border-radius:14px;padding:12px 18px;display:flex;align-items:center;gap:10px;backdrop-filter:blur(16px);box-shadow:0 4px 24px rgba(0,0,0,.5)">
    <span style="color:${c.ic};font-weight:700;font-size:13px">${c.icon}</span>
    <span style="color:${c.txt};font-size:13px;font-weight:500;white-space:nowrap">${esc(msg)}</span>
  </div>`;
  setTimeout(()=>{ box.innerHTML=''; }, 3000);
}

const logoMark = (size='md') => {
  if (size === 'lg') {
    return `<img src="${LOGO_SRC}" alt="Ruslango" style="height:110px;max-width:320px;object-fit:contain">`;
  }
  // sm / md: compact header — icon + text
  const h = size==='sm' ? '28px' : '34px';
  return `<div style="display:flex;align-items:center;gap:6px">
    <img src="${ICON_SRC}" alt="" style="height:${h};object-fit:contain">
    <span style="font-size:${size==='sm'?'15px':'18px'};font-weight:800;color:#fff;letter-spacing:.1em">RUSLANGO</span>
  </div>`;
};

/* ═══════════════════════════════════════
   PAGE: BOOT
═══════════════════════════════════════ */
function renderBoot() {
  return `<div style="min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:28px;background:#070B13">
    ${logoMark('lg')}
    ${spinner(28)}
  </div>`;
}

async function doLogin() {
  const email = $('li-email')?.value?.trim();
  const pass  = $('li-pass')?.value;
  const errEl = $('li-err');
  const btnEl = $('li-btn');
  if (!email || !pass) return;
  errEl.style.display='none';
  btnEl.innerHTML = spinner(16,'#fff') + ' A entrar...';
  btnEl.disabled = true;
  const fn = S.loginMode==='register' ? API.signUp : API.signIn;
  const {user, error} = await fn(email, pass);
  if (error) {
    errEl.textContent = error.message || 'Erro de autenticação';
    errEl.style.display = 'block';
    btnEl.innerHTML = S.loginMode==='register'?'Criar Conta':'Entrar';
    btnEl.disabled = false;
    return;
  }
  S.user = user;
  await loadCompanies();
  S.page = 'companies';
  render();
}

async function selectCo(id) {
  S.company = S.companies.find(c=>c.id===id);
  if (!S.company) return;
  S.filter = 'todas';
  S.expandedCard = null;
  S.deliveries = await API.getDels(id);
  S.page = 'dashboard';
  render();
}

async function delCo(id) {
  if (!confirm('Apagar empresa?')) return;
  await API.delCo(id);
  S.companies = S.companies.filter(c=>c.id!==id);
  render();
}

async function doLogout() {
  await API.signOut();
  S.user=null; S.companies=[]; S.company=null; S.deliveries=[];
  S.page='login'; render();
}

function renderDashboard() {
  const td = today();
  const dels = S.deliveries;
  const totHoje     = dels.filter(d=>d.data===td).reduce((s,d)=>s+d.valor,0);
  const totPago     = dels.filter(d=>d.pagamento==='pago').reduce((s,d)=>s+d.valor,0);
  const totPendente = dels.filter(d=>d.pagamento==='pendente').reduce((s,d)=>s+d.valor,0);

  const filtered =
    S.filter==='pendente'  ? dels.filter(d=>d.status==='pendente') :
    S.filter==='concluida' ? dels.filter(d=>d.status==='concluida') :
    dels;

  const stats = [
    {label:'Hoje',     val:totHoje,     c:'#2260E8', bg:'#2260E815', bo:'#2260E825'},
    {label:'Pago',     val:totPago,     c:'#0FBA81', bg:'#0FBA8115', bo:'#0FBA8125'},
    {label:'Pendente', val:totPendente, c:'#F5A623', bg:'#F5A62315', bo:'#F5A62325'},
  ];

  const statCards = stats.map(s=>
    `<div class="stat" style="background:${s.bg};border:1px solid ${s.bo}">
      <p style="font-size:11px;color:${s.c};font-weight:600;letter-spacing:.05em;margin-bottom:8px">${s.label}</p>
      <p style="color:#fff;font-weight:700;font-size:18px;line-height:1">${kzK(s.val)}</p>
      <p style="color:${s.c}80;font-size:10px;font-weight:500;margin-top:3px">Kz</p>
    </div>`
  ).join('');

  const filters = [['todas','Todas'],['pendente','Pendentes'],['concluida','Concluídas']].map(([k,l])=>
    `<button class="filter-btn tap ${S.filter===k?'active':''}" onclick="setFilter('${k}')">${l}</button>`
  ).join('');

  const cards = filtered.length
    ? filtered.map(d=>renderDelCard(d)).join('')
    : `<div style="text-align:center;padding-top:80px">
        <div style="width:64px;height:64px;background:#0C1220;border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;color:#3D5470">${I.truck}</div>
        <p style="color:#fff;font-weight:600;margin-bottom:6px">Sem entregas</p>
        <p style="color:#4A6080;font-size:13px">Toca em + para adicionar</p>
      </div>`;

  return `<div style="min-height:100vh;background:#070B13;padding-bottom:110px">
    <div class="header">
      <div style="padding-top:12px;display:flex;align-items:center;gap:10px">
        <button class="tap act-icon" onclick="goBack()" style="border-color:#1E2D40;color:#607898">${I.back}</button>
        <div style="flex:1;min-width:0">
          <p class="label" style="margin-bottom:2px">EMPRESA</p>
          <p style="color:#fff;font-weight:700;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${esc(S.company.name)}</p>
        </div>
        <button class="tap act-icon" onclick="genPDF()" style="border-color:#1E2D40;color:#607898">${I.pdf}</button>
      </div>
    </div>

    <div style="padding:0 16px">
      <!-- Stats -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:18px 0 14px">
        ${statCards}
      </div>

      <!-- Filters -->
      <div style="display:flex;gap:8px;align-items:center;margin-bottom:14px">
        ${filters}
        <span style="margin-left:auto;font-size:12px;color:#4A6080;background:#0C1220;border:1px solid #1E2D40;border-radius:10px;padding:5px 10px;font-weight:600">${filtered.length}</span>
      </div>

function renderDelCard(d) {
  const isDone = d.status==='concluida';
  const isPaid = d.pagamento==='pago';
  const exp    = S.expandedCard===d.id;

  const actions = exp ? `
    <div style="padding:12px 14px 14px;border-top:1px solid #1E2D40;display:flex;gap:8px;flex-wrap:wrap">
      ${!isDone ? `<button class="act-btn tap" onclick="patchDel('${d.id}','status','concluida')" style="background:#0FBA8115;color:#0FBA81;border-color:#0FBA8130">${I.check} Concluir</button>` : ''}
      ${!isPaid ? `<button class="act-btn tap" onclick="patchDel('${d.id}','pagamento','pago')" style="background:#F5A62315;color:#F5A623;border-color:#F5A62330">${I.cash} Marcar Pago</button>` : ''}
      <button class="act-icon tap" onclick="sendWA('${esc(d.id)}')" style="color:#25D366;border-color:#25D36630;background:#25D36615">${I.wa}</button>
      <button class="act-icon tap" onclick="showDelForm('${esc(d.id)}')" style="color:#2260E8;border-color:#2260E830;background:#2260E815">${I.edit}</button>
      <button class="act-icon tap" onclick="deleteDel('${esc(d.id)}')" style="color:#E84242;border-color:#E8424230;background:#E8424215">${I.trash}</button>
    </div>` : '';

  return `<div class="card ${isDone?'card-done':''} fade-up" id="card-${esc(d.id)}">
    <div class="tap" onclick="toggleCard('${esc(d.id)}')" style="padding:16px 16px 14px;cursor:pointer">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div style="flex:1;min-width:0">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
            ${isDone?`<span style="width:7px;height:7px;background:#0FBA81;border-radius:50%;flex-shrink:0"></span>`:''}
            <p style="color:#fff;font-weight:600;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin:0">${esc(d.cliente_nome)}</p>
          </div>
          <p style="color:#4A6080;font-size:13px;margin:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">
            ${d.origem?esc(d.origem)+' → ':''}${esc(d.destino)}
          </p>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <p style="color:#fff;font-weight:700;font-size:15px;margin:0 0 4px">${kz(d.valor)}</p>
          <span style="font-size:12px;font-weight:600;color:${isPaid?'#0FBA81':'#F5A623'}">${isPaid?'Pago':'A receber'}</span>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-top:12px;flex-wrap:wrap">
        <span class="badge ${isDone?'badge-done':'badge-pending'}">${isDone?'✓ Concluída':'⏳ Pendente'}</span>
        ${d.data?`<span style="font-size:11px;color:#4A6080;background:#1E2D40;padding:3px 9px;border-radius:8px">${fmtD(d.data)}</span>`:''}
      </div>
    </div>
    ${actions}
  </div>`;
}

function setFilter(f) {
  S.filter=f;
  render();
}

function toggleCard(id) {
  S.expandedCard = S.expandedCard===id ? null : id;
  const list = $('del-list');
  if (!list) return;
  const filtered =
    S.filter==='pendente'  ? S.deliveries.filter(d=>d.status==='pendente') :
    S.filter==='concluida' ? S.deliveries.filter(d=>d.status==='concluida') :
    S.deliveries;
  list.innerHTML = filtered.map(d=>renderDelCard(d)).join('');
}

async function patchDel(id, key, val) {
  const patch = {};
  patch[key] = val;
  await API.patchDel(id, patch);
  S.deliveries = S.deliveries.map(d=>d.id===id?{...d,...patch}:d);
  S.expandedCard = null;
  const list = $('del-list');
  if (list) {
    const filtered =
      S.filter==='pendente'  ? S.deliveries.filter(d=>d.status==='pendente') :
      S.filter==='concluida' ? S.deliveries.filter(d=>d.status==='concluida') :
      S.deliveries;
    list.innerHTML = filtered.map(d=>renderDelCard(d)).join('');
  }
  // Update stats
  render();
  toast(key==='status' ? 'Entrega concluída!' : 'Pagamento registado!');
}

async function deleteDel(id) {
  if (!confirm('Apagar esta entrega?')) return;
  await API.delDel(id);
  S.deliveries = S.deliveries.filter(d=>d.id!==id);
  S.expandedCard = null;
  render();
  toast('Entrega apagada', 'err');
}

function sendWA(id) {
  const d = S.deliveries.find(x=>x.id===id);
  if (!d) return;
  const msg = `🚚 *RUSLANGO — Entrega Atribuída*\n\n👤 *Cliente:* ${d.cliente_nome}\n📍 *Origem:* ${d.origem||'—'}\n🎯 *Destino:* ${d.destino}\n💰 *Valor:* ${kz(d.valor)}\n📅 *Data:* ${fmtD(d.data)}\n\n_Por favor confirma a recepção._`;
  const num = (d.telefone||'').replace(/\D/g,'');
  const url = num ? `https://wa.me/244${num}?text=${encodeURIComponent(msg)}` : `https://wa.me/?text=${encodeURIComponent(msg)}`;
  window.open(url,'_blank');
}

function goBack() {
  S.company=null; S.deliveries=[]; S.expandedCard=null;
  S.page='companies'; render();
}

/* ═══════════════════════════════════════
   PDF
═══════════════════════════════════════ */
function genPDF() {
  if (!window.jspdf) { toast('jsPDF não carregou. Verifica a ligação.','err'); return; }
  const {jsPDF} = window.jspdf;
  const doc = new jsPDF({unit:'mm',format:'a4'});
  const date = new Date().toLocaleDateString('pt-PT');
  const dels = S.deliveries;
  const total   = dels.reduce((s,d)=>s+d.valor,0);
  const paid    = dels.filter(d=>d.pagamento==='pago').reduce((s,d)=>s+d.valor,0);
  const pending = total-paid;

  doc.setFillColor(7,11,19); doc.rect(0,0,210,50,'F');
  doc.setFillColor(26,52,96); doc.rect(0,0,5,50,'F');
  doc.setTextColor(255,255,255); doc.setFontSize(22); doc.setFont('helvetica','bold');
  doc.text('RUSLANGO',14,20);
  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(74,96,128);
  doc.text('Sistema de Gestão de Entregas',14,28);
  doc.setTextColor(245,166,35);
  doc.text(`Empresa: ${S.company.name}`,14,37);
  doc.setTextColor(74,96,128); doc.text(`Relatório: ${date}`,150,20);
  doc.text(`Total de entregas: ${dels.length}`,150,28);

  const cY=56;
  [[total,[34,96,232],'TOTAL'],[paid,[15,186,129],'PAGO'],[pending,[245,166,35],'PENDENTE']].forEach(([v,c,l],i)=>{
    const x=14+i*64;
    doc.setFillColor(12,18,32); doc.roundedRect(x,cY,60,24,3,3,'F');
    doc.setTextColor(...c); doc.setFontSize(7); doc.setFont('helvetica','bold');
    doc.text(l,x+5,cY+9);
    doc.setFontSize(10); doc.text(`${v.toLocaleString('pt-AO')} Kz`,x+5,cY+19);
  });

  const tY=cY+32;
  doc.setFillColor(17,25,39); doc.rect(14,tY,182,9,'F');
  doc.setTextColor(74,96,128); doc.setFontSize(7.5); doc.setFont('helvetica','bold');
  ['CLIENTE','DESTINO','VALOR','ENTREGA','PAGAMENTO'].forEach((h,i)=>{
    doc.text(h,[18,68,118,148,172][i],tY+6);
  });

  let y=tY+11;
  dels.forEach((d,i)=>{
    if(y>270){doc.addPage();y=20;}
    if(i%2===0){doc.setFillColor(11,17,32);doc.rect(14,y-2,182,9,'F');}
    doc.setFont('helvetica','normal'); doc.setTextColor(200,212,228); doc.setFontSize(8);
    doc.text(String(d.cliente_nome||'').substring(0,20),18,y+5);
    doc.text(String(d.destino||'').substring(0,18),68,y+5);
    doc.text(`${d.valor.toLocaleString('pt-AO')} Kz`,118,y+5);
    const sc = d.status==='concluida'?[15,186,129]:[245,166,35];
    doc.setTextColor(...sc); doc.text(d.status==='concluida'?'Concluída':'Pendente',148,y+5);
    const pc = d.pagamento==='pago'?[15,186,129]:[232,66,66];
    doc.setTextColor(...pc); doc.text(d.pagamento==='pago'?'Pago':'Pendente',172,y+5);
    y+=9;
  });

  doc.save(`Ruslango-${date.replace(/\//g,'-')}.pdf`);
  toast('PDF gerado com sucesso!');
}

/* ═══════════════════════════════════════
   MODAL: NEW COMPANY
═══════════════════════════════════════ */
function showNewCoModal() {
  const ov = $('overlay');
  ov.innerHTML = `
    <div class="slide-up" style="width:100%;background:#0C1220;border:1px solid #1E2D40;border-radius:24px 24px 0 0;padding:20px 20px 40px">
      <div style="width:40px;height:4px;background:#1E2D40;border-radius:4px;margin:0 auto 20px"></div>
      <h3 style="color:#fff;font-weight:700;font-size:18px;margin:0 0 18px">Nova Empresa</h3>
      <input type="text" id="co-name" placeholder="Nome da empresa" style="margin-bottom:16px" onkeydown="if(event.key==='Enter')saveNewCo()">
      <div style="display:flex;gap:10px">
        <button class="btn btn-ghost tap" onclick="closeOverlay()" style="flex:1">Cancelar</button>
        <button class="btn btn-primary tap" onclick="saveNewCo()" style="flex:1" id="co-save-btn">Criar</button>
      </div>
    </div>`;
  ov.classList.add('open');
  setTimeout(()=>{ const el=$('co-name'); if(el)el.focus(); },300);
}

async function saveNewCo() {
  const name = ($('co-name')?.value||'').trim();
  if (!name) return;
  const btn = $('co-save-btn');
  if (btn) { btn.innerHTML=spinner(16,'#fff')+' Criar'; btn.disabled=true; }
  const c = await API.addCo(S.user.id, name);
  S.companies.push(c);
  closeOverlay();
  render();
  toast('Empresa criada!');
}

/* ═══════════════════════════════════════
   MODAL: DELIVERY FORM
═══════════════════════════════════════ */
function showDelForm(id) {
  const d = id ? S.deliveries.find(x=>x.id===id) : null;
  const isEdit = !!d;
  const ov = $('overlay');

  const field = (label, inputHtml) =>
    `<div><label style="font-size:12px;color:#607898;font-weight:500;display:block;margin-bottom:7px">${label}</label>${inputHtml}</div>`;

  const inp = (id, type, val, ph) =>
    `<input type="${type}" id="f-${id}" value="${esc(val||'')}" placeholder="${ph||''}">`;

  const sel = (id, val, opts) =>
    `<select id="f-${id}">${opts.map(([v,l])=>`<option value="${v}"${val===v?' selected':''}>${l}</option>`).join('')}</select>`;

  ov.innerHTML = `
    <div class="slide-up" style="width:100%;background:#0C1220;border:1px solid #1E2D40;border-radius:24px 24px 0 0;max-height:92vh;display:flex;flex-direction:column">
      <div style="padding:16px 20px 14px;border-bottom:1px solid #1E2D40;flex-shrink:0">
        <div style="width:40px;height:4px;background:#1E2D40;border-radius:4px;margin:0 auto 16px"></div>
        <div style="display:flex;align-items:center;justify-content:space-between">
          <h3 style="color:#fff;font-weight:700;font-size:18px;margin:0">${isEdit?'Editar Entrega':'Nova Entrega'}</h3>
          <button class="tap act-icon" onclick="closeOverlay()" style="color:#607898;border-color:#1E2D40">${I.x}</button>
        </div>
      </div>
      <div style="overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:14px;flex:1">
        ${field('Nome do Cliente *', inp('nome','text',d?.cliente_nome,'Ex: João Silva'))}
        ${field('Telefone', inp('tel','tel',d?.telefone,'9XX XXX XXX'))}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${field('Origem', inp('origem','text',d?.origem,'Bairro'))}
          ${field('Destino *', inp('destino','text',d?.destino,'Bairro'))}
        </div>
        ${field('Valor (Kz) *', inp('valor','number',d?.valor,'0'))}
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          ${field('Entrega', sel('status',d?.status||'pendente',[['pendente','Pendente'],['concluida','Concluída']]))}
          ${field('Pagamento', sel('pag',d?.pagamento||'pendente',[['pendente','Pendente'],['pago','Pago']]))}
        </div>
        ${field('Data', inp('data','date',d?.data||today(),''))}
      </div>
      <div style="padding:16px 20px 36px;border-top:1px solid #1E2D40;flex-shrink:0">
        <button class="btn btn-primary tap" id="f-save-btn" onclick="saveDelForm('${esc(id||'')}')">✓  Guardar Entrega</button>
      </div>
    </div>`;
  ov.classList.add('open');
}

async function saveDelForm(editId) {
  const nome    = ($('f-nome')?.value||'').trim();
  const destino = ($('f-destino')?.value||'').trim();
  const valorRaw= $('f-valor')?.value||'0';
  if (!nome || !destino || !valorRaw) { toast('Preenche os campos obrigatórios *', 'err'); return; }

  const btn = $('f-save-btn');
  if (btn) { btn.innerHTML=spinner(16,'#fff')+' A guardar...'; btn.disabled=true; }

  const payload = {
    company_id:   S.company.id,
    cliente_nome: nome,
    telefone:     $('f-tel')?.value||'',
    origem:       $('f-origem')?.value||'',
    destino:      destino,
    valor:        parseFloat(valorRaw)||0,
    status:       $('f-status')?.value||'pendente',
    pagamento:    $('f-pag')?.value||'pendente',
    data:         $('f-data')?.value||today(),
  };

  if (editId) {
    await API.patchDel(editId, payload);
    S.deliveries = S.deliveries.map(d=>d.id===editId?{...d,...payload}:d);
    toast('Entrega actualizada ✓');
  } else {
    const nd = await API.addDel(payload);
    S.deliveries.unshift(nd);
    toast('Entrega registada ✓');
  }

  closeOverlay();
  S.expandedCard = null;
  render();
}

/* ═══════════════════════════════════════
   OVERLAY
═══════════════════════════════════════ */
function closeOverlay() {
  $('overlay').classList.remove('open');
  $('overlay').innerHTML='';
}

function overlayClick(e) {
  if (e.target === $('overlay')) closeOverlay();
}

/* ═══════════════════════════════════════
   RENDER
═══════════════════════════════════════ */
function render() {
  const app = $('app');
  if (!app) return;
  switch (S.page) {
    case 'boot':       app.innerHTML = renderBoot(); break;
    case 'login':      app.innerHTML = renderLogin(); break;
    case 'companies':  app.innerHTML = renderCompanies(); break;
    case 'dashboard':  app.innerHTML = renderDashboard(); break;
  }
}

/* ═══════════════════════════════════════
   INIT
═══════════════════════════════════════ */
async function init() {
  render(); // show boot
  const u = await API.session();
  if (u) {
    S.user = u;
    await loadCompanies();
    S.page = 'companies';
  } else {
    S.page = 'login';
  }
  render();

  if (!DEMO && window.supabase && sb) {
    sb.auth.onAuthStateChange((_,session) => {
      if (!session) { S.user=null; S.company=null; S.deliveries=[]; S.page='login'; render(); }
    });
  }
}

init();
</script>
